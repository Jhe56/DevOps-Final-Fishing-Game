name: UAT Blue Green Deploy

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy-uat:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name fishing-game-eks

      - name: Deploy green frontend
        run: |
          kubectl apply -f k8s/blue-green/frontend-green.yaml

      - name: Wait for green rollout
        run: |
          kubectl rollout status deployment/frontend-green --timeout=120s

      - name: Smoke test current app
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh

      - name: Promote green to UAT
        run: |
          chmod +x scripts/promote-frontend.sh
          ./scripts/promote-frontend.sh green