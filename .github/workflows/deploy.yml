name: Deploy Fishing Game

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          254361319875.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push auth image
        run: |
          docker build -t fishing-app:auth ./backend/services/account-authorization
          docker tag fishing-app:auth 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:auth
          docker push 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:auth

      - name: Build and push gameplay image
        run: |
          docker build -t fishing-app:gameplay ./backend/services/gameplay
          docker tag fishing-app:gameplay 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:gameplay
          docker push 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:gameplay

      - name: Build and push profile image
        run: |
          docker build -t fishing-app:profile ./backend/services/player-profile
          docker tag fishing-app:profile 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:profile
          docker push 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:profile

      - name: Build and push frontend image
        run: |
          docker build -t fishing-app:frontend ./frontend
          docker tag fishing-app:frontend 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:frontend
          docker push 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:frontend

      - name: Make deploy script executable
        run: chmod +x scripts/deploy.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Deploy infrastructure and app
        run: ./scripts/deploy.sh