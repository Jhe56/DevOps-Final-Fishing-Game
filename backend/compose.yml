services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: fishing_game
      MYSQL_USER: fishuser
      MYSQL_PASSWORD: fishpass
    ports:
      - "3306:3306"
    volumes:
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  auth:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/account-authorization:/app
    command: sh -c "npm install && node server.js"
    env_file:
      - .env
    ports:
      - "4001:4001"
    depends_on:
      - mysql
  
  gameplay:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/gameplay:/app
    command: sh -c "npm install && node server.js"
    env_file:
      - .env
    ports:
      - "4002:4002"
    depends_on:
      - mysql

  player-profile:
    image: node:20
    working_dir: /app
    volumes:
      - ./services/player-profile:/app
    command: sh -c "npm install && node server.js"
    env_file:
      - .env
    ports:
      - "4003:4003"
    depends_on:
      - mysql