<!DOCTYPE html>
<html>
<head>
  <title>Fishing Game</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    input, select {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    #profile {
      position: absolute;
      top: 10px;
      right: 20px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .modal-content {
      background: #1e293b;
      padding: 20px;
      margin: 15% auto;
      width: 300px;
      border-radius: 10px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Fishing Game 🎣</h1>

<div id="profile"></div>

<button onclick="showRegister()">Register</button>
<button onclick="showLogin()">Login</button>
<!-- Title Shop temporarily disabled -->

<!-- Register Modal -->
<div id="registerModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModals()">✖</span>
    <h3>Register</h3>
    <input id="reg-username" placeholder="username"><br>
    <input id="reg-password" type="password" placeholder="password"><br>
    <button onclick="register()">Submit</button>
  </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModals()">✖</span>
    <h3>Login</h3>
    <input id="login-username" placeholder="username"><br>
    <input id="login-password" type="password" placeholder="password"><br>
    <button onclick="login()">Submit</button>
  </div>
</div>

<h2>Catch Fish</h2>
<select id="location">
  <option>Lake</option>
  <option>River</option>
  <option>Ocean</option>
</select>
<button onclick="catchFish()">Catch</button>

<h2>Inventory</h2>
<button onclick="loadInventory()">Load</button>
<ul id="inventory" style="list-style:none; padding:0;"></ul>

<script src="app.js"></script>

</body>
</html>
