apiVersion: apps/v1
kind: Deployment
metadata:
  name: gameplay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gameplay
  template:
    metadata:
      labels:
        app: gameplay
    spec:
      containers:
        - name: gameplay
          image: 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:gameplay
          ports:
            - containerPort: 4002