apiVersion: v1
kind: ConfigMap
metadata:
  name: db-schema
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS fishing_game;
    USE fishing_game;

    CREATE TABLE IF NOT EXISTS users (
      id INT AUTO_INCREMENT PRIMARY KEY,
      username VARCHAR(50) NOT NULL UNIQUE,
      password_hash VARCHAR(255) NOT NULL,
      title VARCHAR(50) DEFAULT 'Rookie Angler',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS fish_species (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(100) NOT NULL UNIQUE,
      location VARCHAR(50) NOT NULL,
      rarity ENUM('common', 'uncommon', 'rare') NOT NULL
    );

    CREATE TABLE IF NOT EXISTS catches (
      id INT AUTO_INCREMENT PRIMARY KEY,
      user_id INT NOT NULL,
      fish_id INT NOT NULL,
      quantity INT NOT NULL DEFAULT 1,
      caught_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
      FOREIGN KEY (fish_id) REFERENCES fish_species(id) ON DELETE CASCADE
    );

    CREATE TABLE IF NOT EXISTS inventory (
      id INT AUTO_INCREMENT PRIMARY KEY,
      user_id INT NOT NULL,
      fish_id INT NOT NULL,
      quantity INT NOT NULL DEFAULT 0,
      UNIQUE KEY unique_user_fish (user_id, fish_id),
      FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
      FOREIGN KEY (fish_id) REFERENCES fish_species(id) ON DELETE CASCADE
    );

    CREATE TABLE IF NOT EXISTS titles (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(50) NOT NULL UNIQUE,
      required_fish_count INT NOT NULL
    );

    INSERT IGNORE INTO fish_species (name, location, rarity) VALUES
    ('Bluegill', 'Lake', 'common'),
    ('Bass', 'Lake', 'uncommon'),
    ('Golden Koi', 'Lake', 'rare'),
    ('Minnow', 'River', 'common'),
    ('Salmon', 'River', 'uncommon'),
    ('Crystal Carp', 'River', 'rare'),
    ('Sardine', 'Ocean', 'common'),
    ('Tuna', 'Ocean', 'uncommon'),
    ('Mythic Marlin', 'Ocean', 'rare');

    INSERT IGNORE INTO titles (name, required_fish_count) VALUES
    ('Rookie Angler', 0),
    ('Pond Regular', 5),
    ('River Scout', 10),
    ('Ocean Hunter', 20),
    ('Legendary Fisher', 50);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-schema-job
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mysql-client
          image: mysql:8
          command:
            - sh
            - -c
            - |
              mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" < /schema/schema.sql
          
          envFrom:
            - configMapRef:
                name: db-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password

          volumeMounts:
            - name: schema-volume
              mountPath: /schema
      volumes:
        - name: schema-volume
          configMap:
            name: db-schema
  backoffLimit: 2