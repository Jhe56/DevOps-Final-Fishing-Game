apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-auth
  template:
    metadata:
      labels:
        app: account-auth
    spec:
      containers:
        - name: account-auth
          image: 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:auth
          ports:
            - containerPort: 4001

          env:
            - name: DB_HOST
              value: "RDS Endpoint"

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              value: "fishadmin"

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password

            - name: DB_NAME
              value: "fishing_game"
              