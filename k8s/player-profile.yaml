apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-profile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: player-profile
  template:
    metadata:
      labels:
        app: player-profile
    spec:
      containers:
        - name: player-profile
          image: 254361319875.dkr.ecr.us-east-1.amazonaws.com/fishing-app:profile
          ports:
            - containerPort: 4003

          env:
            - name: DB_HOST
              value: "RDS Endpoint"

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              value: "fishadmin"

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password

            - name: DB_NAME
              value: "fishing_game"